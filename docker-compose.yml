services:
  db:
    image: postgres:17-alpine
    container_name: eventosnorma_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${EVENTOSNORMA_DB_NAME}
      POSTGRES_USER: ${EVENTOSNORMA_DB_USER}
      POSTGRES_PASSWORD: ${EVENTOSNORMA_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eventos_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventosnorma_backend
    env_file:
      - .env
    ports:
      - "5000:8080"
    depends_on:
      - db
    volumes:
      - uploads_data:/app/wwwroot/uploads
    networks:
      - eventos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventosnorma_frontend
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - eventos_network

networks:
  eventos_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
